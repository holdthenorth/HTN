[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22.12.0"

# Edge functions
[[edge_functions]]
  path     = "/story/*"
  function = "story-og"

[[edge_functions]]
  path     = "/api/fetch-rss"
  function = "fetch-rss"
