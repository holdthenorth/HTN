[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22.12.0"

# Edge functions (Deno runtime — run at the CDN edge before the SPA is served)
[[edge_functions]]
  path     = "/story/*"
  function = "story-og"

# ---------------------------------------------------------------------------
# Cache headers
# ---------------------------------------------------------------------------

# Vite content-hashes every filename in /assets/ — safe to cache for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker and Workbox runtime must never be cached by the browser
# so updates take effect immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/workbox-*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Static images — 7 days, stale-while-revalidate for instant repeat loads
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Everything else (HTML, manifests) — always revalidate so deploys are instant
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
