<!doctype html>
<html lang="en-CA" style="overflow-x:hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Hold the North — Independent Canadian News</title>
    <meta name="description" content="Hold the North is Canada's independent news platform — curating the stories that matter on sovereignty, tariffs, housing, and everyday Canadian life." />
    <meta name="keywords" content="Canadian news, independent Canadian news, Canadian sovereignty, Iran war Canada, Strait of Hormuz, tariffs Canada, Trump threats Canada, Mark Carney, housing affordability Canada, Alberta separatism, gas prices Canada, cost of living Canada, Artemis II Jeremy Hansen, China Canada trade, Indigenous rights Canada, Pierre Poilievre, Canadian dollar" />
    <meta name="author" content="Hold the North" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://holdthenorth.news/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hold the North" />
    <meta property="og:title" content="Hold the North — Independent Canadian News" />
    <meta property="og:description" content="Hold the North is Canada's independent news platform — curating the stories that matter on sovereignty, tariffs, housing, and everyday Canadian life." />
    <meta property="og:url" content="https://holdthenorth.news/" />
    <meta property="og:image" content="https://holdthenorth.news/htncrop.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_CA" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hold the North — Independent Canadian News" />
    <meta name="twitter:description" content="Hold the North is Canada's independent news platform — curating the stories that matter on sovereignty, tariffs, housing, and everyday Canadian life." />
    <meta name="twitter:image" content="https://holdthenorth.news/htncrop.png" />
    <meta name="twitter:site" content="@holdthenorth" />

    <!-- Fonts (JetBrains Mono needed for Media Kit) -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hidden form for Netlify Forms detection (required for Vite SPA builds) -->
    <form name="htn-submit" netlify data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="htn-submit" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="type" type="text" />
      <input name="subject" type="text" />
      <input name="url" type="text" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
